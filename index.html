<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebOS Pro v5</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ANIMATED WALLPAPER -->
  <div class="wallpaper">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <!-- BOOT SCREEN -->
  <div class="boot" id="boot">
    <div class="boot-card">
      <div class="boot-logo">WEBOS</div>
      <div class="boot-text" id="bootText">Starting system...</div>
      <div class="boot-bar">
        <div class="boot-fill" id="bootFill"></div>
      </div>
    </div>
  </div>

  <!-- EMY GUIDE -->
  <div class="emy" id="emy">
    <div class="emy-bubble" id="emyBubble">Hi, I'm Emmy — your guide.</div>
    <div class="emy-body">
      <div class="emy-face">
        <div class="emy-eye left"></div>
        <div class="emy-eye right"></div>
        <div class="emy-lash left"></div>
        <div class="emy-lash right"></div>
        <div class="emy-blush left"></div>
        <div class="emy-blush right"></div>
        <div class="emy-beak"></div>
      </div>
      <div class="emy-wing left"></div>
      <div class="emy-wing right"></div>
    </div>
  </div>

  <!-- DESKTOP -->
  <div class="desktop" id="desktop">

    <!-- TOP BAR -->
    <div class="topbar">
      <div class="top-left">
        <span class="top-logo"></span>
        <span class="top-name">WebOS</span>
      </div>

      <div class="top-right">
        <span id="clock"></span>
      </div>
    </div>

    <!-- WINDOWS CONTAINER -->
    <div id="windows"></div>

    <!-- DOCK -->
    <div class="dock" id="dock">

      <div class="dock-item" onclick="openApp('assistant')">
        <div class="dock-icon">🧠</div>
        <span>Assistant</span>
      </div>

      <div class="dock-item" onclick="openApp('worldclock')">
        <div class="dock-icon">🌍</div>
        <span>Clock</span>
      </div>

      <div class="dock-item" onclick="openApp('encyclopedia')">
        <div class="dock-icon">📚</div>
        <span>Ency</span>
      </div>

      <div class="dock-item" onclick="openApp('crafts')">
        <div class="dock-icon">✂️</div>
        <span>Crafts</span>
      </div>

      <div class="dock-item" onclick="openApp('paint')">
        <div class="dock-icon">🎨</div>
        <span>Paint</span>
      </div>

      <div class="dock-item" onclick="openApp('notes')">
        <div class="dock-icon">📝</div>
        <span>Notes</span>
      </div>

      <div class="dock-item" onclick="openApp('games')">
        <div class="dock-icon">🎮</div>
        <span>Games</span>
      </div>

      <div class="dock-item" onclick="openApp('voice')">
        <div class="dock-icon">🎙️</div>
        <span>Voice</span>
      </div>

      <div class="dock-item" onclick="openApp('fakenews')">
        <div class="dock-icon">📰</div>
        <span>News</span>
      </div>

      <div class="dock-item" onclick="openApp('credits')">
        <div class="dock-icon">🌸</div>
        <span>Credits</span>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
